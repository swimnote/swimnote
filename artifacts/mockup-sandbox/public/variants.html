<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1400"/>
<title>주간 스케줄러 시안 비교</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
     background:#E8E4DF;padding:28px 20px;min-width:1360px}

.page-header{text-align:center;margin-bottom:24px}
.page-header h1{font-size:20px;font-weight:700;color:#1F2937;margin-bottom:4px}
.page-header p{font-size:12px;color:#6B7280}

.compare-row{display:flex;gap:24px;justify-content:center;align-items:flex-start}

/* ── 폰 껍데기 ── */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:10px}
.phone-label{font-size:13px;font-weight:700;color:#374151;letter-spacing:-.3px}
.phone-sub{font-size:10px;color:#9CA3AF;margin-top:-6px}
.phone{width:390px;background:#fff;border-radius:28px;
       box-shadow:0 10px 40px rgba(0,0,0,.18);overflow:hidden}

/* ── 공통 주간표 ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;
          padding:8px 8px;border-bottom:1px solid #E8E3DE}
.nav-btn{padding:8px;cursor:pointer;color:#374151;font-size:17px;line-height:1}
.nav-title{font-size:13px;font-weight:600;color:#1F2937}

.badge-row{padding:10px 10px 4px}
.badge{display:inline-flex;align-items:center;padding:3px 9px;
       border-radius:10px;font-size:10px;font-weight:600}
.badge-wd{background:#EFF6FF;color:#1F6FAE}
.badge-we{background:#FEF3C7;color:#92400E}

.grid-row{display:flex}
.hdr-row{border-bottom:1px solid #E8E3DE}
.time-top{background:#FBF8F6;border-right:1px solid #E8E3DE;flex-shrink:0}
.time-cell{background:#FBF8F6;border-right:1px solid #E8E3DE;
           display:flex;align-items:flex-start;justify-content:center;
           padding-top:5px;flex-shrink:0}
.time-txt{font-size:10px;color:#B0A89D}

.day-hdr{display:flex;flex-direction:column;align-items:center;justify-content:center;
         border-left:1px solid #E8E3DE;background:#FBF8F6;flex-shrink:0;height:46px}
.day-hdr.today{background:#1F8F8612}
.hdr-date{font-size:10px;color:#9CA3AF;line-height:1.3}
.hdr-name{font-size:12px;font-weight:600;color:#1F2937;line-height:1.3}
.day-hdr.today .hdr-date,.day-hdr.today .hdr-name{color:#1F8F86}

.cell{border-left:1px solid #EAE7E2;border-bottom:1px solid #F0EDE9;
      flex-shrink:0;overflow:hidden}
.cell-sun{background:#FAFAFA}

.section-div{height:8px;background:#F0EDE9;margin:4px 0}
.closed-pill{display:inline-flex;align-items:center;gap:3px;
             background:#FEF3C7;padding:2px 7px;border-radius:10px;
             border:1px solid #F59E0B;font-size:9px;color:#92400E;font-weight:500}

/* ──────────────────────────────────────────
   시안 A — 기본형 (최대 밀도)
─────────────────────────────────────────── */
.a-card{border-radius:4px;padding:2px 3px 2px 6px;
        border:1px solid transparent;position:relative;overflow:hidden;
        display:flex;flex-direction:column;gap:1px}
.a-accent{position:absolute;left:0;top:0;bottom:0;width:2.5px}
.a-name{font-size:9px;font-weight:600;color:#111827;line-height:1.3;padding-left:1px}
.a-students{font-size:8px;color:#374151;line-height:1.3;padding-left:1px}

/* ──────────────────────────────────────────
   시안 B — 운영형 (아이콘 + 상태)
─────────────────────────────────────────── */
.b-card{border-radius:5px;padding:4px 5px 4px 8px;
        border:1px solid transparent;position:relative;overflow:hidden;
        display:flex;flex-direction:column;gap:2px}
.b-accent{position:absolute;left:0;top:0;bottom:0;width:3px}
.b-name{font-size:10px;font-weight:700;color:#111827;line-height:1.3;padding-left:1px}
.b-students{font-size:8.5px;color:#374151;line-height:1.35;padding-left:1px}
.b-status{display:flex;align-items:center;gap:3px;padding-left:1px;margin-top:1px}
.b-badge{display:inline-flex;align-items:center;gap:1.5px;
         padding:1px 4px;border-radius:4px;font-size:7.5px;font-weight:600}
.b-att-ok{background:#D1FAE5;color:#065F46}
.b-att-no{background:#FEE2E2;color:#991B1B}
.b-diary-ok{background:#EDE9FE;color:#4C1D95}
.b-diary-no{background:#FEF9C3;color:#78350F}

/* ──────────────────────────────────────────
   시안 C — 가독성형 (넓은 여백)
─────────────────────────────────────────── */
.c-card{border-radius:7px;padding:6px 6px 6px 10px;
        border:1px solid transparent;position:relative;overflow:hidden;
        display:flex;flex-direction:column;gap:3px}
.c-accent{position:absolute;left:0;top:0;bottom:0;width:4px}
.c-name{font-size:11px;font-weight:700;color:#111827;line-height:1.4;padding-left:2px}
.c-students{display:flex;flex-wrap:wrap;gap:3px;padding-left:2px;margin-top:1px}
.c-student-chip{font-size:9px;color:#374151;background:#F3F4F6;
                padding:1px 5px;border-radius:4px;line-height:1.4;white-space:nowrap}
</style>
</head>
<body>

<div class="page-header">
  <h1>주간 스케줄러 UI 시안 비교</h1>
  <p>동일 데이터 기준 · 동일 시간축 구조 (주중 13–22시 / 주말 07–16시)</p>
</div>

<div class="compare-row">
  <div class="phone-wrap">
    <div class="phone-label">🅐 기본형</div>
    <div class="phone-sub">최대 밀도 · 9–10px · 압축</div>
    <div class="phone" id="phone-a"></div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">🅑 운영형</div>
    <div class="phone-sub">이름 + 상태 아이콘 · 빠른 파악</div>
    <div class="phone" id="phone-b"></div>
  </div>
  <div class="phone-wrap">
    <div class="phone-label">🅒 가독성형</div>
    <div class="phone-sub">넓은 여백 · 이름 칩 · 읽기 편함</div>
    <div class="phone" id="phone-c"></div>
  </div>
</div>

<script>
/* ──────── 공통 데이터 ──────── */
const WEEKDAY_H = Array.from({length:10},(_,i)=>i+13);
const SAT_H     = Array.from({length:10},(_,i)=>i+7);
const WEEKDAYS  = ["월","화","수","목","금"];
const WEEKEND   = ["토","일"];
const DATE_LBL  = {월:"3/24",화:"3/25",수:"3/26",목:"3/27",금:"3/28",토:"3/29",일:"3/30"};
const TODAY_DAY = ["일","월","화","수","목","금","토"][new Date().getDay()];

const CLASSES = [
  {name:"아이핀반",   days:["월","화","수","목","금"],hour:14,color:"#D6F0EE",ac:"#1F8F86",
   students:["김도현","이서연","박지호"],total:3,checked:2,diary:true},
  {name:"돌고래반",   days:["월","수","금"],          hour:15,color:"#FCE7F3",ac:"#EC4899",
   students:["최민준","정수아"],total:2,checked:2,diary:true},
  {name:"상어반",     days:["화","목"],               hour:15,color:"#FEF3C7",ac:"#E4A93A",
   students:["윤지원","강서준"],total:2,checked:1,diary:false},
  {name:"고래반",     days:["월","화","수","목","금"],hour:17,color:"#EDE9FE",ac:"#8B5CF6",
   students:["윤지원","강서준","오하늘","신지훈"],total:4,checked:3,diary:true},
  {name:"물고기반",   days:["월","화","수","목","금"],hour:19,color:"#D1FAE5",ac:"#2E9B6F",
   students:["이하준","김소율"],total:2,checked:2,diary:true},
  {name:"오리반",     days:["월","화","수","목","금"],hour:20,color:"#DBEAFE",ac:"#4EA7D8",
   students:["박우진","최서아","정민호"],total:3,checked:0,diary:false},
  {name:"토토반",     days:["토"],                    hour:9, color:"#D6F0EE",ac:"#1F8F86",
   students:["김도현","이서연"],total:2,checked:1,diary:false},
  {name:"꼬마상어반", days:["토"],                    hour:10,color:"#FEF3C7",ac:"#E4A93A",
   students:["최민준","정수아","박지호"],total:3,checked:3,diary:true},
  {name:"수영왕반",   days:["토"],                    hour:13,color:"#EDE9FE",ac:"#8B5CF6",
   students:["윤지원"],total:1,checked:1,diary:true},
];

function getCls(day, h){ return CLASSES.filter(c=>c.days.includes(day)&&c.hour===h); }

/* ──────── 시안별 카드 렌더러 ──────── */
function cardA(c){
  return `<div class="a-card" style="background:${c.color}">
    <div class="a-accent" style="background:${c.ac}"></div>
    <div class="a-name">${c.name}</div>
    <div class="a-students">${c.students.join(" · ")}</div>
  </div>`;
}
function cardB(c){
  const attOk = c.checked >= c.total;
  return `<div class="b-card" style="background:${c.color}">
    <div class="b-accent" style="background:${c.ac}"></div>
    <div class="b-name">${c.name}</div>
    <div class="b-students">${c.students.join(" · ")}</div>
    <div class="b-status">
      <span class="b-badge ${attOk?'b-att-ok':'b-att-no'}">
        ${attOk?'✓':'✗'} 출결 ${c.checked}/${c.total}
      </span>
      <span class="b-badge ${c.diary?'b-diary-ok':'b-diary-no'}">
        ${c.diary?'✓':'✎'} 일지
      </span>
    </div>
  </div>`;
}
function cardC(c){
  const chips = c.students.map(s=>`<span class="c-student-chip">${s}</span>`).join("");
  return `<div class="c-card" style="background:${c.color}">
    <div class="c-accent" style="background:${c.ac}"></div>
    <div class="c-name">${c.name}</div>
    <div class="c-students">${chips}</div>
  </div>`;
}

/* ──────── 그리드 빌더 ──────── */
function buildSection(days, hours, colW, timeW, rowH, cardFn, badgeClass, badgeLabel){
  let h = `<div class="badge-row"><span class="badge ${badgeClass}">${badgeLabel}</span></div>`;
  // header
  h += `<div class="grid-row hdr-row">
    <div class="time-top" style="width:${timeW}px;height:46px"></div>`;
  days.forEach(d=>{
    const isT = d===TODAY_DAY;
    h += `<div class="day-hdr${isT?' today':''}" style="width:${colW}px">
      <span class="hdr-date">${DATE_LBL[d]}</span>
      <span class="hdr-name">${d}</span>
    </div>`;
  });
  h += `</div>`;
  // rows
  hours.forEach(hr=>{
    h += `<div class="grid-row" style="height:${rowH}px">
      <div class="time-cell" style="width:${timeW}px;height:${rowH}px">
        <span class="time-txt">${hr}</span>
      </div>`;
    days.forEach(d=>{
      const isSun = d==="일";
      const cls   = getCls(d, hr);
      const midH  = hours[Math.floor(hours.length/2)];
      h += `<div class="cell${isSun?' cell-sun':''}"
               style="width:${colW}px;height:${rowH}px;padding:2px;display:flex;flex-direction:column;gap:2px;position:relative">
        ${cls.map(cardFn).join("")}
        ${isSun && hr===midH && cls.length===0 ? `<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center"><span class="closed-pill">🌙 휴무</span></div>` : ""}
      </div>`;
    });
    h += `</div>`;
  });
  return h;
}

function buildPhone(id, variant){
  const W      = 390;
  const TW     = 32;
  const WD_COL = Math.floor((W-TW)/5);
  const WE_COL = Math.floor((W-TW)/2);

  const rowH = {a:46, b:60, c:74}[variant];
  const cardFn = {a:cardA, b:cardB, c:cardC}[variant];

  const wdSec = buildSection(WEEKDAYS,WEEKDAY_H,WD_COL,TW,rowH,cardFn,"badge-wd","주중&nbsp; 13 – 22시");
  const weSec = buildSection(WEEKEND, SAT_H,    WE_COL,TW,rowH,cardFn,"badge-we","주말&nbsp; 07 – 16시");

  document.getElementById(id).innerHTML = `
    <div class="week-nav">
      <span class="nav-btn">‹</span>
      <span class="nav-title">3월 24일 ~ 3월 30일</span>
      <span class="nav-btn">›</span>
    </div>
    ${wdSec}
    <div class="section-div"></div>
    ${weSec}
    <div style="height:16px"></div>`;
}

buildPhone("phone-a","a");
buildPhone("phone-b","b");
buildPhone("phone-c","c");
</script>
</body>
</html>
